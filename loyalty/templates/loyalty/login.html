<!DOCTYPE html>
<html>
<head>
    <title>Staff Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #ecfdf3; color: #064e3b; }
        .container { max-width: 480px; margin: auto; min-height: 100vh; background: #f8fffb; }
        .header { padding: 28px 22px; background: linear-gradient(135deg,#007a3d,#064e3b); color: white; border-bottom-left-radius: 28px; border-bottom-right-radius: 28px; }
        .brand { font-size: 28px; font-weight: bold; }
        .card { margin: 18px; padding: 18px; background: white; border-radius: 18px; box-shadow: 0 8px 24px rgba(0,80,40,.08); border: 1px solid #d1fae5; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 16px; margin-bottom: 14px; }
        .button { width: 100%; padding: 16px; background: linear-gradient(135deg,#059669,#047857); color: white; border: none; border-radius: 14px; font-size: 18px; font-weight: bold; }
        .error { color: #b91c1c; font-weight: bold; margin-bottom: 12px; }
        a { color: #047857; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="brand">Staff Login</div>
        <div>Pop Pop Solution</div>
    </div>

    <div class="card">
        {% if form.errors %}
            <div class="error">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Username</label>
            {{ form.username }}

            <label>Password</label>
            {{ form.password }}

            <button class="button" type="submit">Login</button>
        </form>
    </div>

    <div class="card">
        <a href="/">← Back to Customer Page</a>
    </div>

</div>
</body>
</html>
