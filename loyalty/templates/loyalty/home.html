<!DOCTYPE html>
<html>
<head>
    <title>Pop Pop Solution Loyalty</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ecfdf3;
            color: #064e3b;
        }

        .container {
            max-width: 480px;
            margin: auto;
            min-height: 100vh;
            background: #f8fffb;
        }

        .header {
            padding: 28px 22px;
            background: linear-gradient(135deg, #007a3d, #064e3b);
            color: white;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            margin: 18px;
            padding: 18px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 80, 40, 0.08);
            border: 1px solid #d1fae5;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #065f46;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #059669;
            box-shadow: 0 0 0 3px #d1fae5;
        }

        .hint {
            margin-top: 8px;
            font-size: 13px;
            color: #64748b;
        }

        .locked {
            background: #f1f5f9;
            color: #64748b;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .status.exist { color: #15803d; }
        .status.new { color: #b45309; }

        .button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .button:active {
            transform: scale(0.98);
        }

        .promo {
            margin: 18px;
            padding: 16px;
            border-radius: 16px;
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
            text-align: center;
            font-weight: bold;
        }

        .footer {
            margin-top: 28px;
            padding: 22px;
            text-align: center;
            background: #064e3b;
            color: white;
            font-size: 14px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="header">
        <div class="brand">Pop Pop Solution</div>
        <div class="subtitle">Buy 10 Free 1 Loyalty</div>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="card">
            <label>Customer HP Number</label>
            <input
                id="phone"
                name="phone"
                required
                placeholder="e.g. 0123456789"
                inputmode="tel"
                autocomplete="off"
            >
            <div class="hint">Enter customer phone number. QR scan function can be added later.</div>
            <div id="phoneStatus" class="status"></div>
        </div>

        <div class="card">
            <label>Customer Name <span style="font-size:13px;">(first time only)</span></label>
            <input
                id="name"
                name="name"
                placeholder="Enter customer name"
                autocomplete="off"
            >
            <div class="hint">If phone number already exists, name will auto fill and cannot be changed.</div>
        </div>

        <div class="card">
            <label>Quantity Bought</label>
            <input
                name="quantity"
                type="number"
                min="1"
                required
                placeholder="Enter quantity"
                inputmode="numeric"
            >
        </div>

        <div class="card">
            <label>Staff Name</label>
            <select name="staff_name" required>
                <option value="Rebi">Rebi</option>
                <option value="Choo">Choo</option>
            </select>
        </div>

        <div class="card">
            <button class="button" type="submit">Save Purchase</button>
        </div>
    </form>

    <div class="promo">
        Every 10 purchased, get 1 free!
    </div>

    <div class="footer">
        Thank you for your support<br>
        © 2026 Pop Pop Solution
    </div>

</div>

<script>
    const phoneInput = document.getElementById("phone");
    const nameInput = document.getElementById("name");
    const phoneStatus = document.getElementById("phoneStatus");

    let timer = null;

    phoneInput.addEventListener("input", function () {
        clearTimeout(timer);

        const phone = phoneInput.value.trim();

        nameInput.value = "";
        nameInput.readOnly = false;
        nameInput.classList.remove("locked");
        phoneStatus.innerText = "";

        if (phone.length < 6) return;

        timer = setTimeout(() => {
            fetch(`/lookup/?phone=${encodeURIComponent(phone)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.exists) {
                        nameInput.value = data.name || "";
                        nameInput.readOnly = true;
                        nameInput.classList.add("locked");
                        phoneStatus.innerText = "Existing customer found";
                        phoneStatus.className = "status exist";
                    } else {
                        nameInput.readOnly = false;
                        nameInput.classList.remove("locked");
                        phoneStatus.innerText = "New customer";
                        phoneStatus.className = "status new";
                    }
                });
        }, 400);
    });
</script>

</body>
</html>
